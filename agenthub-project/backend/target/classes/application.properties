# PostgreSQL — variables de entorno del docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenthub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:agenthub}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:agenthub123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto
server.port=8080

# JWT
jwt.secret=agenthub-super-secret-key-2024-minimum-32-characters-long
jwt.expiration=86400000