services:
  # PostgreSQL
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  # Ollama (LLM) - Comentado temporalmente
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # Después de levantar:
  #   # docker exec -it ollama ollama pull phi3:mini
  
  # Backend (Spring Boot)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agenthub
      SPRING_DATASOURCE_USERNAME: agenthub
      SPRING_DATASOURCE_PASSWORD: agenthub123
      # OLLAMA_URL: http://ollama:11434
    depends_on:
      - postgres
      - mcp-legal
      # - ollama
    env_file:
      - ./backend/.env
  
  # Frontend (React)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    depends_on:
      - backend

  mcp-legal:
    build: ./mcp-servers/legal
    ports:
      - "8001:8001"
    restart: unless-stopped
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8001
      - MCP_ALLOW_ALL_ORIGINS=true
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
  # ollama_data:
